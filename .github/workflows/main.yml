---
on:
  pull_request:
    types: [opened, reopened, synchronize, closed]
  push:
    branches:
      - main
    tags:
      - 'v*'
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:

  test:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        version:
          - latest
          - 5.3
          - 5.2
          - 5.1
          - 5.0
          - 4.4
          - 4.3
          - 4.2
          - 4.1
          - 4.0
          - 3.2
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          build-args: VERSION=${{ matrix.version }}
          target: test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: ${{matrix.version == 'latest'}}

  test_ubuntu:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: ./tests/citest.sh

  shellcheck:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: shellcheck bin/L_lib.sh

  test_pip:
    runs-on: ubuntu-latest
    needs: [test, test_ubuntu]
    if: github.event.action != 'closed'
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: make test_pip

  test_freebsd:
    runs-on: ubuntu-latest
    needs: [test, test_ubuntu]
    if: github.event.action != 'closed'
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: vmactions/freebsd-vm@v1
        with:
          prepare: |
            pkg install -y jq bash pstree
          run: |
            ./tests/citest.sh

  test_windows:
    runs-on: windows-latest
    needs: [test, test_ubuntu]
    if: github.event.action != 'closed'
    timeout-minutes: 10
    env:
      MSYS_NO_PATHCONV: 1
    steps:
      - uses: actions/checkout@v6
      - shell: bash
        run: |
          ./tests/citest.sh

  docs:
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    timeout-minutes: 5
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
      - run: make docs_build
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: site
          branch: gh-pages
          clean-exclude: pr-preview/
          force: false
      - name: Deploy preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: site
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: deploy

  build_basher:
    runs-on: ubuntu-latest
    needs: [test, test_ubuntu]
    if: github.event.action != 'closed'
    timeout-minutes: 5
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: type=ref,event=branch,prefix=bashercache_
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: basher
          pull: true
          load: true
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy_docker:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [test, test_ubuntu, shellcheck, docs, build_basher, test_pip, test_freebsd, test_windows]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          cache-from: type=gha
          cache-to: type=gha,mode=max
          pull: true
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  preview_cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Remove preview
        uses: rossjrw/pr-preview-action@v1
        with:
          preview-branch: gh-pages
          umbrella-dir: pr-preview
          action: remove

  pypi-publish:
    name: Upload release to PyPI
    needs: [test, test_ubuntu, shellcheck, test_pip, test_freebsd, test_windows]
    if: github.event_name == 'push' && contains(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/p/L_lib
    permissions:
      id-token: write
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: install build python package
        run: pip install --upgrade build
      - name: build the package
        run: python -m build
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
